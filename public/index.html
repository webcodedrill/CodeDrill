<body>
  <!-- Ye sirf ek launcher page hai. CodeDrill ka har page (auth, home,
       mcqs, questions, paragraph, profile, rank) ab apni alag index.html
       file me hai pages/ folder ke andar. Ye file bas check karti hai ke
       user already login hai ya nahi, aur us hisaab se sahi page khol deti hai. -->
  <script src="js/state.js"></script>
  <script>
    const user = getUser();
    window.location.replace(user ? 'pages/home/index.html' : 'pages/auth/index.html');
  </script>
